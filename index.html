<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões de Paginação</title>
    <style>
        .pagination-container {
            display: flex;
            gap: 0; /* Botões encostados, mude para 5px se quiser espaço entre eles */
        }

        .btn-pg {
            /* Estilo Base */
            background-color: #ffffff;
            border: 1px solid #d3d3d3; /* Cinza claro */
            color: #007bff; /* Azul */
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            font-family: sans-serif;
            transition: background-color 0.3s;
            
            /* Remove bordas duplas se estiverem colados */
            margin-left: -1px; 
        }

        /* Ajuste para o primeiro botão não ter margem negativa */
        .btn-pg:first-child {
            margin-left: 0;
            border-top-left-radius: 4px;
            border-bottom-left-radius: 4px;
        }

        .btn-pg:last-child {
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        /* Efeito ao passar o mouse (Hover) */
        .btn-pg:hover {
            background-color: #d3d3d3; /* Fica cinza claro igual à borda */
            color: #007bff; /* Texto permanece azul */
        }
    </style>
</head>
<body style="display: flex;justify-content: center;"
>

    <div class="pagination-container">
        <button class="btn-pg">&lt;</button>
        <button class="btn-pg">1</button>
        <button class="btn-pg">2</button>
        <button class="btn-pg">3</button>
        <button class="btn-pg">&gt;</button>
    </div>

</body>
</html>
